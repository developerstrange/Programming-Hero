<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
</head>

<body>
  <h3 title="Fill up the form">Form for pitha:</h3>
  <form action="">
    <p>Name: <input type="text" name="" id=""></p>
    <p>Telephone: <input type="tel" name="" id=""></p>
    <p>Email: <input type="email" name="" id=""></p>

    <fieldset>
      <legend>Select your pitha</legend>
      <p><label for="chitoi"><input type="radio" name="pitha" id="chitoi">Chitoi pitha</label></p>
      <p><label for="vapa"><input type="radio" name="pitha" id="vapa">Vapa pitha</label></p>
      <p><label for="tel"><input type="radio" name="pitha" id="tel">Teler pitha</label></p>
    </fieldset>
    <fieldset>
      <legend>Select your vorta</legend>
      <p><label for="shutki"><input type="checkbox" name="" id="sutki">Shutki vorta</label></p>
      <p><label for="sorisha"><input type="checkbox" name="" id="sorisha">Sorisha vorta</label></p>
    </fieldset>
  </form>
  <p>
    <label for="">Special Instruction: <textarea name="" id=""></textarea></label>
  </p>
  <button type="submit">Order confirmed</button>
</body>

</html>
