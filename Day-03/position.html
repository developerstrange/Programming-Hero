<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postion</title>
  <style>
    .container {
      background-color: aqua;
    }

    div {
      height: 100px;
      width: 100px;
    }

    #first {
      background-color: greenyellow;
    }

    #second {
      background-color: rebeccapurple;
      position: absolute;
      left: 50px;
    }

    #third {
      background-color: orangered;
      position: relative;
      left: 100px;
    }
    /*
    #first{
      position: fixed;
    } 
    */
  </style>
</head>

<body>
  <section>
    <h1>Learning and climbing position high.</h1>
  </section>
  <section class="container">
    <div id="first"></div>
    <div id="second"></div>
    <div id="third"></div>
  </section>
</body>

</html>
