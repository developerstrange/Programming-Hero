<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cricket</title>
  <style>
    .ball{
      height: 30px;
      width: 30px;
      border-radius: 50%;
      border: none;
      background-color: red;
      position: relative;
      left: 350px;
      transition: transform 2s ease-in-out 1s;
    }
    .field:hover .ball{
      transform: translate(600px, -200px);
    }
    .bat{
      height: 200px;
      transition: transform 1s ease-in-out;
    }
    .bat:hover{
      transform: rotate(-60deg);
      transform-origin: 100% 0%;
    }
  </style>
</head>
<body>
  <div class="field">
    <img class="bat" src="iimages/png-transparent-cricket-bats-gray-nicolls-batting-baseball-bats-graynicolls-cricket-gray-nicolls-batting.png" alt="">
    <div class="ball"></div>
  </div>
</body>
</html>
