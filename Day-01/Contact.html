<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="images/images.ico">
  <title>Contact</title>
</head>

<body>
  <h2>Contact Me</h2>
  <section class="Contact">
    <p>
      I’d love to hear from you — whether it’s about collaboration, internship opportunities, or tech discussions. Feel
      free to connect via my social platforms or send me a message directly.
    </p>
    <p>Thanks for visiting!</p>
    <button class="facebook" style="color: black; background-color: rgb(216, 214, 71); padding: 10px; border-radius: 5px;">
      <a href="https://www.facebook.com/">Facebook</a>
    </button>
    <button class="instagram" style="color: black; background-color: rgb(216, 214, 71); padding: 10px; border-radius: 5px;">
      <a href="https://www.instagram.com/">Instagram</a>
    </button>
    <button class="gmail" style="color: black; background-color: rgb(216, 214, 71); padding: 10px; border-radius: 5px;">
      <a href="https://mail.google.com/mail/u/0/">Gmail</a>
    </button>
    <button class="linkdin" style="color: black; background-color: rgb(216, 214, 71); padding: 10px; border-radius: 5px;">
      <a href="https://www.linkedin.com/">linkdin</a>
    </button>
  </section>
</body>

</html>
