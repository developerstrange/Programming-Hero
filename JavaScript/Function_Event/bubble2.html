<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event practice</title>
  </head>
  <body>
    <div id="container">
      <h2>My list</h2>
      <ul id="mylist">
        <li id="first" class="item">Lorem ipsum dolor sit.</li>
        <li class="item">Quisquam fuga nobis quos?</li>
        <li class="item">Quia ullam sunt libero?</li>
      </ul>
    </div>

    <button id="addBtn">Add item</button>

    <script>
      // var items = document.getElementsByClassName("item");

      // for (let i = 0; i < items.length; i++) {
      //   const item = items[i];
      //   item.addEventListener("click", function (event) {
      //     event.target.parentNode.removeChild(event.target);
      //   });
      // }

      document
        .getElementById("addBtn")
        .addEventListener("click", function (event) {
          var newItem = document.getElementById("mylist");
          var addItem = document.createElement("li");
          addItem.innerText = "New item added";

          newItem.appendChild(addItem);
        });

      document
        .getElementById("mylist")
        .addEventListener("click", function (event) {
          event.target.parentNode.removeChild(event.target);
        });
    </script>
  </body>
</html>
