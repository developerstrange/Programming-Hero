<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event practice</title>
  </head>
  <body>
    <div id="container">
      <h2>My list</h2>
      <ul id="mylist">
        <li id="first" class="item">Lorem ipsum dolor sit.</li>
        <li class="item">Quisquam fuga nobis quos?</li>
        <li class="item">Quia ullam sunt libero?</li>
      </ul>
    </div>

    <script>
      document
        .getElementById("first")
        .addEventListener("click", function (event) {
          console.log("First list has been clicked");
        });

      document
        .getElementById("mylist")
        .addEventListener("click", function (event) {
          console.log("Ul has been clicked");
          event.stopPropagation();
        });

      document
        .getElementById("container")
        .addEventListener("click", function (event) {
          console.log("container has been clicked");
        });
    </script>
  </body>
</html>
