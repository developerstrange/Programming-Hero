<!DOCTYPE html>
<html lang="en">

<head>

  <link rel="icon" href="images/fim.ico" type="images/x-icon">
  <link rel="stylesheet" href="style_F.css">
  <script src="script.js" defer></script>
  <title>Hey, It's for you!!</title>

<body>

  <div class="screen" id="screen1">
    <div class="intro-screen">
      <div class="heart-animation">
        <span class="heart-emoji">❤️</span>
      </div>
    </div>
  </div>
  <div class="screen" id="screen2">
    <span class="Verify">
      <h2>Verify you are human...</h2>
    </span>
    <div class="choose-me">
      <img src="images/emoji.avif" alt="emoji" class="wrong">
      <img src="images/emoji.avif" alt="emoji" class="wrong">
      <img src="images/emoji.avif" alt="emoji" class="wrong">
      <img src="images/emoji.avif" alt="emoji" class="wrong">
      <img id="me" src="images/Screenshot 2026-01-16 221023.png" alt="emoji" class="correct">
      <img src="images/emoji.avif" alt="emoji" class="wrong">
      <img src="images/emoji.avif" alt="emoji" class="wrong">
      <img src="images/emoji.avif" alt="emoji" class="wrong">
      <img src="images/emoji.avif" alt="emoji" class="wrong">
    </div>
  </div>
  <div class="screen" id="screen3">
    <h2 class="welcome-text">
      Hey,!! <br>I made this for you!!
    </h2>
    <div class="reveal-button">
      <button class="tap-button">TAP MY HEART</button>
    </div>
  </div>
  <div class="screen" id="screen4">
    <div class="image-container">
      <img src="images/Screenshot 2026-01-16 221023.png" alt="Cutie Mayesha">
    </div>
  </div>
  <div class="screen" id="screen5">
    <h3 class="text" id="finalText"></h3>
  </div>

</html>
